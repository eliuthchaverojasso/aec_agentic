# EMA AI — Reference Validation Allowlist
# Intentionally preserved references that the validator should not flag as errors.
# Each entry must have a documented reason.
# Do not use this file to hide genuinely stale references.

allowed_historical_files:
  # These files are explicitly marked HISTORICAL and may contain relative dates,
  # old PRs, or old branch names by design.
  - docs/demo/THURSDAY_DEMO_PLAN.md
  - docs/demo/DEMO_MENU_CLEANUP.md
  - docs/16_CHANGELOG/2026-05-28-state.md
  - .ai/PR_REVIEW_SUMMARY.md
  - .ai/AGENT_HANDOFF.md
  - .ai/CHANGELOG_MEMORY.md

allowed_patterns:
  # The CHANGELOG_MEMORY records historical remote URLs for audit trail purposes.
  # The old eliuthchaverojasso URL appears there as a historical fact.
  - file: .ai/CHANGELOG_MEMORY.md
    pattern: eliuthchaverojasso
    reason: >
      Historical log entry recording the former remote origin before repository
      transfer to echavero-shock. Preserved as audit evidence.

  # DECISIONS.md D020 retains the old branch name in a clearly labeled historical section.
  - file: .ai/DECISIONS.md
    pattern: feat/landing-documents-end-to-end
    reason: >
      Decision D020 records a historical branch consolidation decision from 2026-05-23.
      Section is labeled HISTORICAL.

  # CONTEXT_RECOVERY.md retains historical commits in a labeled section.
  - file: .ai/CONTEXT_RECOVERY.md
    pattern: d936d1c|ed57753|7561fa5|3aa1ad0|9af04b9|a12ca94|4828104|a935d52|4959996
    reason: >
      Historical commit SHAs from the feat/landing-documents-end-to-end sprint,
      preserved in a clearly labeled HISTORICAL section for traceability.

  # The audit baseline itself documents stale references for audit purposes.
  - file: docs/audits/PROJECT_REFERENCE_BASELINE.md
    pattern: eliuthchaverojasso|feat/landing-documents-end-to-end|PR #2|126 passed
    reason: >
      The baseline audit document records stale references as findings.
      These are documented facts, not live references.

  # The manifest documents the former owner for repository-history traceability.
  - file: .ai/PROJECT_REFERENCE_MANIFEST.yaml
    pattern: eliuthchaverojasso
    reason: >
      The manifest records the former owner under former_owner for traceability.
      This is the canonical historical record.

  # PRODUCTION_READINESS_GAP exists to say EMA AI is NOT production-ready.
  # The phrase "production-ready" appears in that negative context.
  - file: docs/release/PRODUCTION_READINESS_GAP.md
    pattern: production.ready|production-ready
    reason: >
      This document's entire purpose is to state that EMA AI is NOT production-ready
      and enumerate gaps. The phrase appears in that explicit negative context.

  # KNOWN_LIMITATIONS discusses what is not implemented.
  - file: docs/release/KNOWN_LIMITATIONS.md
    pattern: production.ready|production-ready
    reason: >
      Limitations document; phrase appears only in "not production-ready" context.

  # README uses "not production compliance software" in the product boundary section.
  - file: README.md
    pattern: production compliance|Not production
    reason: >
      README product boundary section uses "Not production compliance software"
      as an explicit disclaimer.

  # DEMO_DATA_PACKAGE.md says "Do not claim readiness is production-ready" — prohibition, not claim.
  - file: .ai/DEMO_DATA_PACKAGE.md
    pattern: production.ready
    reason: >
      The phrase appears as "Do not claim readiness is production-ready" —
      an explicit prohibition, not an affirmative claim.

  # AGENTS.md defines what agents must NOT claim, so it lists the forbidden phrases.
  - file: AGENTS.md
    pattern: Azure is deployed|APS.*implemented|GraphRAG.*implemented|production.ready|this week|next sprint
    reason: >
      AGENTS.md enumerates prohibited overclaims in a "Prohibited Overclaims" list.
      The phrases appear only in the context of what agents must NOT do.

  # FEATURE_GAP_MATRIX.md row now says HISTORICAL explicitly.
  - file: .ai/FEATURE_GAP_MATRIX.md
    pattern: PR #2
    reason: >
      Row has been labeled HISTORICAL (2026-05-23). The PR #2 reference is preserved
      as historical context, not an active reference.

  # CHANGELOG_MEMORY records historical events including PR #2 sprint note.
  - file: .ai/CHANGELOG_MEMORY.md
    pattern: PR #2
    reason: >
      Historical changelog entry from 2026-05-23 sprint. The file is in the
      allowed_historical_files list.

  # ROADMAP.md "Next sprint" — needs to be fixed in source but allow in ROADMAP for now.
  - file: .ai/ROADMAP.md
    pattern: Next sprint
    reason: >
      ROADMAP.md contains "Next sprint" as a milestone column value.
      This is flagged for human update; allowlisted temporarily until updated.

  # Validation baseline and final audit document the stale references as findings.
  # Audit records quote the exact stale strings they found (stale owner, PR #2, old
  # branch, stale test counts) AND the relative-date phrases they remediated
  # ("Thursday Demo", "this week", "Today"). These are documented findings inside
  # markdown tables, not live current-state claims.
  - file: docs/audits/
    # Single-quoted so the literal '#' in 'PR #2' is not parsed as a YAML comment
    # (which silently truncated this pattern before the reconciliation fix).
    pattern: 'eliuthchaverojasso|PR #2|feat/landing-documents-end-to-end|126 passed|production.ready|Thursday [Dd]emo|this week|next sprint|\bToday\b'
    reason: >
      Audit documents record stale references and remediated relative dates as
      findings. These are documented facts about what was found, not live references.

  # LANDING_DOCUMENT_PIPELINE says "Do not claim X is production-ready until implemented."
  - file: docs/landing/LANDING_DOCUMENT_PIPELINE.md
    pattern: production.ready
    reason: >
      The phrase appears only in "Do not claim ... is production-ready until it is
      implemented" — an explicit prohibition, not an affirmative claim.

  # SEION_CLAIMS_POLICY lists what SEION must NOT do, including "do not say SEION approves readiness."
  - file: docs/specs/SEION_CLAIMS_POLICY.md
    pattern: SEION approves
    reason: >
      Policy document enumerating what SEION must not claim. The phrase
      "Do not say SEION approves readiness" is a prohibition, not a claim.
