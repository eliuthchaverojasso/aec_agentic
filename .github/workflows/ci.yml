name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  scaffold-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: python -m pip install pytest
      - name: Run scaffold tests
        shell: pwsh
        run: ./scripts/test.ps1

