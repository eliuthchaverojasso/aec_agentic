# Alembic configuration for the AEC Agentic Control Plane (control-plane-api).
#
# The database URL is intentionally NOT set here. alembic/env.py resolves it at
# runtime from app.config.settings (DATABASE_URL) so Alembic and the application
# share exactly one DSN source. A caller may override it by setting
# `sqlalchemy.url` on the Config object (the migration test harness does this to
# target a throwaway database).

[alembic]
script_location = alembic
prepend_sys_path = .
# Revision filenames: <rev>_<slug>.py. Revision ids are assigned by hand
# (0001_baseline, 0002_..., ...) for a readable, linear history.
file_template = %%(rev)s_%%(slug)s
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
