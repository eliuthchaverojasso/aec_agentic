services:
  postgres:
    image: postgres:16-alpine
    container_name: ema_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ema_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-ema_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ema} -d ${POSTGRES_DB:-ema_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ema_api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ema}:${POSTGRES_PASSWORD:-ema_dev_pw}@postgres:5432/${POSTGRES_DB:-ema_ai}
      LANDING_DIR: /app/landing
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      EMA_AI_PRODUCT_VERSION: ${EMA_AI_PRODUCT_VERSION:-1.0.0-dev.1}
      EMA_AI_GIT_SHA: ${EMA_AI_GIT_SHA:-unknown}
      EMA_AI_INSTALL_ROOT: ${EMA_AI_INSTALL_ROOT:-/app}
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/landing:/app/landing
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: nginx:1.27-alpine
    container_name: ema_frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
    name: ema_postgres_data
