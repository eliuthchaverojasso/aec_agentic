services:
  postgres:
    image: postgres:16-alpine
    container_name: ema_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ema_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-ema_ai}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema lives in infra/database/ema-db (paths are relative to this compose file).
      - ../database/ema-db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ../database/ema-db/migrations/20260615_001_requirement_audit_v1.sql:/docker-entrypoint-initdb.d/02_requirement_audit.sql:ro
      - ../database/ema-db/migrations/20260620_002_landing_documents.sql:/docker-entrypoint-initdb.d/03_landing_documents.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ema} -d ${POSTGRES_DB:-ema_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ema_api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ema}:${POSTGRES_PASSWORD:-ema_dev_pw}@postgres:5432/${POSTGRES_DB:-ema_ai}
      LANDING_DIR: /app/landing
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://192.168.1.66:5173,http://192.168.1.69:5173,http://ema-ai-demo.shokworks.io:5173}
      UPLOAD_TO_BUCKET: ${UPLOAD_TO_BUCKET:-false}
      BUCKET_NAME: ${BUCKET_NAME:-}
      BUCKET_REGION: ${BUCKET_REGION:-}
      BUCKET_ENDPOINT_URL: ${BUCKET_ENDPOINT_URL:-}
      BUCKET_PREFIX: ${BUCKET_PREFIX:-}
      BUCKET_ACL: ${BUCKET_ACL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      - "${API_PORT:-8010}:8000"
    volumes:
      - ./app:/app/app:ro
      - ./landing:/app/landing
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    name: ema_postgres_data
