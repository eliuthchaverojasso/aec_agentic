# Canonical local stack for the AEC Agentic Control Plane.
#
# This is THE compose file — scripts/bootstrap.ps1 and scripts/dev.ps1 both use it.
# It provisions:
#   - postgres : the ema_ai / ema database the migrated control-plane-api and its
#                test suite use. It starts empty; schema is applied by `migrate`.
#   - migrate  : one-shot `alembic upgrade head`; `api` waits for it to finish.
#   - api      : the control-plane-api (FastAPI), built from apps/control-plane-api.
#                The image bundles the app and runs uvicorn on container port 8000
#                (see apps/control-plane-api/Dockerfile); it is published on
#                ${API_PORT:-8010}.
#
# The web console (Vite) runs separately for local dev and is intentionally not
# containerized here (see apps/web-console).
#
# Values interpolate from the repo-root .env, which compose reads automatically;
# scripts/bootstrap.ps1 generates it from .env.example. The :-defaults below keep
# the stack runnable even before .env exists.
#
# Schema is created and versioned by Alembic (Pending Work Register Item 13):
# the one-shot `migrate` service runs `alembic upgrade head` once Postgres is
# healthy, and `api` waits for it to complete. Postgres starts with an empty
# volume — the legacy docker-entrypoint-initdb.d auto-load was removed so there
# is a single schema-authoring mechanism.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ema_ai}
      POSTGRES_USER: ${POSTGRES_USER:-ema}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ema_dev_pw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ema} -d ${POSTGRES_DB:-ema_ai}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - control-plane

  # One-shot schema migrator. Runs `alembic upgrade head` against Postgres and
  # exits 0; `api` waits for it to complete (service_completed_successfully).
  # Built from the same image as `api`, so it ships the same alembic/ + models.
  migrate:
    build:
      context: ./apps/control-plane-api
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ema}:${POSTGRES_PASSWORD:-ema_dev_pw}@postgres:5432/${POSTGRES_DB:-ema_ai}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - control-plane

  api:
    build:
      context: ./apps/control-plane-api
    environment:
      # Host-specific values are set explicitly so they are correct inside the
      # compose network regardless of the host-local DATABASE_URL in .env
      # (which points at localhost for non-Docker runs).
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ema}:${POSTGRES_PASSWORD:-ema_dev_pw}@postgres:5432/${POSTGRES_DB:-ema_ai}
      LANDING_DIR: /app/landing
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      # Optional object-store mirroring (off by default; set these in .env to enable).
      UPLOAD_TO_BUCKET: ${UPLOAD_TO_BUCKET:-false}
      BUCKET_NAME: ${BUCKET_NAME:-}
      BUCKET_REGION: ${BUCKET_REGION:-}
      BUCKET_ENDPOINT_URL: ${BUCKET_ENDPOINT_URL:-}
      BUCKET_PREFIX: ${BUCKET_PREFIX:-}
      BUCKET_ACL: ${BUCKET_ACL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    ports:
      # host ${API_PORT:-8010} -> container 8000 (uvicorn).
      # Fixes the prior 8010:8010 mismatch that left the API unreachable.
      - "${API_PORT:-8010}:8000"
    volumes:
      # Persist uploaded landing files across container rebuilds.
      - landing_data:/app/landing
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - control-plane

networks:
  control-plane:
    driver: bridge

volumes:
  postgres_data:
  landing_data:
